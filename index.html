<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="dashboard">

    <!-- Greeting Module -->
    <section id="greeting-module" class="module">
      <header>
        <p id="greeting-text"></p>
        <time id="time-display"></time>
        <p id="date-display"></p>
      </header>
    </section>

    <!-- Focus Timer -->
    <section id="focus-timer" class="module">
      <h2>Focus Timer</h2>
      <div id="timer-display">25:00</div>
      <div id="timer-completion" class="hidden">Session complete!</div>
      <div class="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
    </section>

    <!-- Task Manager -->
    <section id="task-manager" class="module">
      <h2>Tasks</h2>
      <form id="task-form">
        <input id="task-input" type="text" placeholder="Add a new task…" autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <ul id="task-list"></ul>
    </section>

    <!-- Quick Links -->
    <section id="quick-links" class="module">
      <h2>Quick Links</h2>
      <form id="links-form">
        <input id="link-label-input" type="text" placeholder="Label" autocomplete="off" />
        <input id="link-url-input" type="url" placeholder="https://…" autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <ul id="links-list"></ul>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
